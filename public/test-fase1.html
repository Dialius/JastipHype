<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fase 1 Test - Toast & Payment Methods</title>
    <script defer src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        // Include toast manager
        window.toastManager = function() {
            return {
                toasts: [],
                nextId: 1,
                
                init() {
                    window.addEventListener('toast', (event) => {
                        this.showToast(event.detail.message, event.detail.type, event.detail.options);
                    });
                },
                
                showToast(message, type = 'info', options = {}) {
                    const toast = {
                        id: this.nextId++,
                        message: message,
                        type: type,
                        duration: options.duration || 4000,
                        autoClose: options.autoClose !== false,
                        description: options.description || null,
                        persistent: options.persistent || false
                    };
                    
                    this.toasts.push(toast);
                    
                    if (toast.autoClose && !toast.persistent) {
                        setTimeout(() => {
                            this.removeToast(toast.id);
                        }, toast.duration);
                    }
                    
                    return toast.id;
                },
                
                removeToast(id) {
                    const index = this.toasts.findIndex(toast => toast.id === id);
                    if (index > -1) {
                        this.toasts.splice(index, 1);
                    }
                },
                
                getToastClasses(type) {
                    const typeClasses = {
                        success: 'border-green-200 text-green-900',
                        error: 'border-red-200 text-red-900', 
                        warning: 'border-yellow-200 text-yellow-900',
                        info: 'border-blue-200 text-blue-900'
                    };
                    
                    return {
                        class: typeClasses[type] || typeClasses.info
                    };
                },
                
                getIcon(type) {
                    const icons = {
                        success: `<svg class="w-5 h-5 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>`,
                        error: `<svg class="w-5 h-5 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>`,
                        warning: `<svg class="w-5 h-5 text-yellow-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                        </svg>`,
                        info: `<svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>`
                    };
                    
                    return icons[type] || icons.info;
                }
            };
        };

        window.showToast = function(message, type = 'info', options = {}) {
            const event = new CustomEvent('toast', {
                detail: { message, type, options }
            });
            window.dispatchEvent(event);
        };

        window.paymentMethods = function(initialSelection = 'bank_transfer') {
            return {
                selectedPayment: initialSelection
            };
        };
    </script>
    <style>
        @keyframes progress {
            from { width: 100%; }
            to { width: 0%; }
        }
    </style>
</head>
<body class="bg-gray-50 p-8">
    <div class="max-w-4xl mx-auto">
        <!-- Toast Container -->
        <div x-data="toastManager()" x-init="init()" class="fixed top-4 right-4 z-[999999] pointer-events-none">
            <template x-for="toast in toasts" :key="toast.id">
                <div x-bind="getToastClasses(toast.type)"
                     x-transition:enter="transition ease-out duration-300"
                     x-transition:enter-start="opacity-0 transform translate-x-full scale-95"
                     x-transition:enter-end="opacity-100 transform translate-x-0 scale-1"
                     x-transition:leave="transition ease-in duration-200"
                     x-transition:leave-start="opacity-100 transform translate-x-0 scale-1"
                     x-transition:leave-end="opacity-0 transform translate-x-full scale-95"
                     class="pointer-events-auto mb-3 p-4 rounded-xl shadow-2xl backdrop-blur-sm border bg-white min-w-[300px] max-w-[400px]">
                    
                    <div class="flex items-start gap-3">
                        <div x-html="getIcon(toast.type)" class="flex-shrink-0 mt-0.5"></div>
                        <div class="flex-1 min-w-0">
                            <p class="text-sm font-medium leading-tight text-gray-900" x-text="toast.message"></p>
                            <p x-show="toast.description" class="text-xs text-gray-600 mt-1" x-text="toast.description"></p>
                        </div>
                        <button @click="removeToast(toast.id)" 
                                class="flex-shrink-0 opacity-60 hover:opacity-100 transition-opacity text-gray-400 hover:text-gray-600">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                            </svg>
                        </button>
                    </div>
                    
                    <div x-show="toast.autoClose" class="mt-3 h-0.5 bg-gray-200 rounded-full overflow-hidden">
                        <div class="h-full bg-gray-400 rounded-full transition-all"
                             :style="`animation: progress ${toast.duration}ms linear forwards`"></div>
                    </div>
                </div>
            </template>
        </div>

        <!-- Test Section -->
        <div class="bg-white rounded-xl p-6 shadow-sm mb-6">
            <h1 class="text-2xl font-bold mb-6">Fase 1: Toast Notification System Test</h1>
            
            <div class="space-y-4">
                <h2 class="text-lg font-semibold">Test Toast Notifications:</h2>
                
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="showToast('Please select a size first!', 'error', { 
                        description: 'Choose your preferred size before adding to cart',
                        duration: 4000 
                    })" class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600 transition">
                        Test Error Toast
                    </button>
                    
                    <button onclick="showToast('Item added to cart!', 'success', {
                        description: 'Product successfully added to your shopping cart',
                        duration: 3000
                    })" class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600 transition">
                        Test Success Toast
                    </button>
                    
                    <button onclick="showToast('Wishlist updated', 'info', {
                        description: 'Your wishlist has been updated',
                        duration: 3000
                    })" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600 transition">
                        Test Info Toast
                    </button>
                    
                    <button onclick="showToast('Low stock warning', 'warning', {
                        description: 'Only 2 items left in stock',
                        duration: 4000
                    })" class="bg-yellow-500 text-white px-4 py-2 rounded hover:bg-yellow-600 transition">
                        Test Warning Toast
                    </button>
                </div>
            </div>
        </div>

        <!-- Payment Methods Test -->
        <div class="bg-white rounded-xl p-6 shadow-sm">
            <h2 class="text-lg font-semibold mb-4">Payment Methods Test:</h2>
            
            <div x-data="paymentMethods('bank_transfer')" class="space-y-3">
                <!-- QRIS Payment -->
                <div class="relative group">
                    <label class="block cursor-pointer">
                        <input type="radio" 
                               name="payment_method" 
                               value="qris" 
                               class="sr-only peer"
                               @change="$root.selectedPayment = 'qris'">
                        
                        <div class="relative p-4 rounded-xl border-2 transition-all duration-200 border-gray-200 hover:border-black hover:shadow-md peer-checked:border-black peer-checked:bg-gray-50">
                            <div class="flex items-center justify-between">
                                <div class="flex items-center gap-3">
                                    <div class="relative w-12 h-12 bg-white rounded-lg flex items-center justify-center p-2 border border-gray-200 group-hover:border-black group-hover:shadow-sm transition-all duration-200">
                                        <div class="w-full h-full flex items-center justify-center text-gray-600 text-xs font-bold bg-gray-50 rounded">
                                            QRIS
                                        </div>
                                    </div>
                                    <div class="flex-1">
                                        <h3 class="font-semibold text-gray-900 group-hover:text-black transition-colors">
                                            QRIS
                                        </h3>
                                        <p class="text-sm text-gray-500 mt-0.5">Pay with any e-wallet app</p>
                                    </div>
                                </div>
                                
                                <div class="relative">
                                    <div class="w-5 h-5 rounded-full border-2 border-gray-300 group-hover:border-black transition-colors peer-checked:border-black peer-checked:bg-black">
                                        <div class="absolute inset-1 rounded-full bg-white opacity-0 peer-checked:opacity-100 transition-opacity"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </label>
                </div>

                <!-- E-Wallets -->
                <div x-show="selectedPayment === 'qris'" class="grid grid-cols-2 gap-3 ml-4">
                    <div class="bg-gray-50 rounded-lg p-3 text-center hover:bg-gray-100 transition-colors">
                        <div class="w-6 h-6 mx-auto mb-1 flex items-center justify-center text-xs font-bold text-gray-600 bg-gray-50 rounded">
                            G
                        </div>
                        <span class="text-xs text-gray-600">GoPay</span>
                    </div>
                    <div class="bg-gray-50 rounded-lg p-3 text-center hover:bg-gray-100 transition-colors">
                        <div class="w-6 h-6 mx-auto mb-1 flex items-center justify-center text-xs font-bold text-gray-600 bg-gray-50 rounded">
                            D
                        </div>
                        <span class="text-xs text-gray-600">Dana</span>
                    </div>
                </div>

                <!-- Bank Transfer -->
                <div class="relative group">
                    <label class="block cursor-pointer">
                        <input type="radio" 
                               name="payment_method" 
                               value="bank_transfer" 
                               checked
                               class="sr-only peer"
                               @change="$root.selectedPayment = 'bank_transfer'">
                        
                        <div class="relative p-4 rounded-xl border-2 transition-all duration-200 border-gray-200 hover:border-black hover:shadow-md peer-checked:border-black peer-checked:bg-gray-50">
                            <div class="flex items-center justify-between">
                                <div class="flex items-center gap-3">
                                    <div class="relative w-12 h-12 bg-white rounded-lg flex items-center justify-center p-2 border border-gray-200 group-hover:border-black group-hover:shadow-sm transition-all duration-200">
                                        <div class="w-full h-full flex items-center justify-center text-gray-600 text-xs font-bold bg-gray-50 rounded">
                                            BANK
                                        </div>
                                    </div>
                                    <div class="flex-1">
                                        <h3 class="font-semibold text-gray-900 group-hover:text-black transition-colors">
                                            Bank Transfer
                                        </h3>
                                        <p class="text-sm text-gray-500 mt-0.5">Manual transfer to our bank accounts</p>
                                    </div>
                                </div>
                                
                                <div class="relative">
                                    <div class="w-5 h-5 rounded-full border-2 border-gray-300 group-hover:border-black transition-colors peer-checked:border-black peer-checked:bg-black">
                                        <div class="absolute inset-1 rounded-full bg-white opacity-0 peer-checked:opacity-100 transition-opacity"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </label>
                </div>

                <!-- Bank Details -->
                <div x-show="selectedPayment === 'bank_transfer'" class="bg-gray-50 rounded-xl p-4 border border-gray-200">
                    <h4 class="font-medium text-gray-900 mb-3">Our Bank Accounts:</h4>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="bg-white rounded-lg p-3 border border-gray-200 hover:border-black transition-colors">
                            <div class="h-5 mb-2 flex items-center justify-center text-xs font-bold text-blue-600 bg-blue-50 rounded">
                                BCA
                            </div>
                            <p class="text-xs font-medium">BCA</p>
                            <p class="text-xs text-gray-600">123-456-7890</p>
                        </div>
                        <div class="bg-white rounded-lg p-3 border border-gray-200 hover:border-black transition-colors">
                            <div class="h-5 mb-2 flex items-center justify-center text-xs font-bold text-orange-600 bg-orange-50 rounded">
                                Mandiri
                            </div>
                            <p class="text-xs font-medium">Mandiri</p>
                            <p class="text-xs text-gray-600">987-654-3210</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
