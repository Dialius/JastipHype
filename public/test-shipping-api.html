<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>Test Shipping API</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-8">Test Shipping API</h1>
        
        <!-- Test 1: Provinces -->
        <div class="bg-white rounded-lg shadow p-6 mb-6">
            <h2 class="text-xl font-bold mb-4">Test 1: Get Provinces</h2>
            <button onclick="testProvinces()" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
                Test Provinces
            </button>
            <div id="provinces-result" class="mt-4"></div>
        </div>

        <!-- Test 2: Cities -->
        <div class="bg-white rounded-lg shadow p-6 mb-6">
            <h2 class="text-xl font-bold mb-4">Test 2: Get Cities</h2>
            <select id="province-select" class="border rounded px-4 py-2 mr-2">
                <option value="">Select Province</option>
                <option value="6">DKI Jakarta</option>
                <option value="9">Jawa Barat</option>
                <option value="10">Jawa Tengah</option>
                <option value="11">Jawa Timur</option>
            </select>
            <button onclick="testCities()" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
                Test Cities
            </button>
            <div id="cities-result" class="mt-4"></div>
        </div>

        <!-- Test 3: Shipping Cost -->
        <div class="bg-white rounded-lg shadow p-6 mb-6">
            <h2 class="text-xl font-bold mb-4">Test 3: Calculate Shipping Cost</h2>
            <div class="grid grid-cols-3 gap-4 mb-4">
                <div>
                    <label class="block text-sm font-medium mb-2">Destination City ID</label>
                    <input type="number" id="destination" value="153" class="border rounded px-4 py-2 w-full">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">Weight (grams)</label>
                    <input type="number" id="weight" value="1000" class="border rounded px-4 py-2 w-full">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">Courier</label>
                    <select id="courier" class="border rounded px-4 py-2 w-full">
                        <option value="jne">JNE</option>
                        <option value="tiki">TIKI</option>
                        <option value="pos">POS</option>
                    </select>
                </div>
            </div>
            <button onclick="testCost()" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
                Calculate Cost
            </button>
            <div id="cost-result" class="mt-4"></div>
        </div>

        <!-- Console Log -->
        <div class="bg-gray-800 text-white rounded-lg shadow p-6">
            <h2 class="text-xl font-bold mb-4">Console Log</h2>
            <div id="console-log" class="font-mono text-sm whitespace-pre-wrap"></div>
        </div>
    </div>

    <script>
        function log(message) {
            const consoleLog = document.getElementById('console-log');
            const timestamp = new Date().toLocaleTimeString();
            consoleLog.innerHTML += `[${timestamp}] ${message}\n`;
            consoleLog.scrollTop = consoleLog.scrollHeight;
        }

        async function testProvinces() {
            log('Testing GET /api/location/provinces...');
            const resultDiv = document.getElementById('provinces-result');
            resultDiv.innerHTML = '<p class="text-gray-500">Loading...</p>';
            
            try {
                const response = await fetch('/api/location/provinces');
                const data = await response.json();
                
                log('Response received: ' + JSON.stringify(data).substring(0, 100) + '...');
                
                if (data.rajaongkir && data.rajaongkir.results) {
                    const provinces = data.rajaongkir.results;
                    resultDiv.innerHTML = `
                        <div class="bg-green-50 border border-green-200 rounded p-4">
                            <p class="font-bold text-green-800">✅ SUCCESS</p>
                            <p class="text-sm text-gray-600">Found ${provinces.length} provinces</p>
                            <p class="text-sm text-gray-600 mt-2">Sample: ${provinces[0].province}</p>
                        </div>
                    `;
                    log(`✅ SUCCESS: Found ${provinces.length} provinces`);
                } else {
                    throw new Error('Invalid response format');
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="bg-red-50 border border-red-200 rounded p-4">
                        <p class="font-bold text-red-800">❌ ERROR</p>
                        <p class="text-sm text-gray-600">${error.message}</p>
                    </div>
                `;
                log('❌ ERROR: ' + error.message);
            }
        }

        async function testCities() {
            const provinceId = document.getElementById('province-select').value;
            if (!provinceId) {
                alert('Please select a province');
                return;
            }

            log(`Testing GET /api/location/cities/${provinceId}...`);
            const resultDiv = document.getElementById('cities-result');
            resultDiv.innerHTML = '<p class="text-gray-500">Loading...</p>';
            
            try {
                const response = await fetch(`/api/location/cities/${provinceId}`);
                const data = await response.json();
                
                log('Response received: ' + JSON.stringify(data).substring(0, 100) + '...');
                
                if (data.rajaongkir && data.rajaongkir.results) {
                    const cities = data.rajaongkir.results;
                    let citiesList = cities.slice(0, 5).map(c => `${c.type} ${c.city_name}`).join(', ');
                    if (cities.length > 5) citiesList += '...';
                    
                    resultDiv.innerHTML = `
                        <div class="bg-green-50 border border-green-200 rounded p-4">
                            <p class="font-bold text-green-800">✅ SUCCESS</p>
                            <p class="text-sm text-gray-600">Found ${cities.length} cities</p>
                            <p class="text-sm text-gray-600 mt-2">Sample: ${citiesList}</p>
                        </div>
                    `;
                    log(`✅ SUCCESS: Found ${cities.length} cities`);
                } else {
                    throw new Error('Invalid response format');
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="bg-red-50 border border-red-200 rounded p-4">
                        <p class="font-bold text-red-800">❌ ERROR</p>
                        <p class="text-sm text-gray-600">${error.message}</p>
                    </div>
                `;
                log('❌ ERROR: ' + error.message);
            }
        }

        async function testCost() {
            const destination = document.getElementById('destination').value;
            const weight = document.getElementById('weight').value;
            const courier = document.getElementById('courier').value;

            log(`Testing POST /api/location/cost (dest: ${destination}, weight: ${weight}, courier: ${courier})...`);
            const resultDiv = document.getElementById('cost-result');
            resultDiv.innerHTML = '<p class="text-gray-500">Loading...</p>';
            
            try {
                const response = await fetch('/api/location/cost', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json',
                        'X-CSRF-TOKEN': document.querySelector('meta[name="csrf-token"]')?.content || ''
                    },
                    body: JSON.stringify({
                        destination: parseInt(destination),
                        weight: parseInt(weight),
                        courier: courier
                    })
                });

                const data = await response.json();
                
                log('Response received: ' + JSON.stringify(data).substring(0, 200) + '...');
                
                if (data.rajaongkir && data.rajaongkir.results) {
                    const results = data.rajaongkir.results;
                    let html = '<div class="bg-green-50 border border-green-200 rounded p-4">';
                    html += '<p class="font-bold text-green-800">✅ SUCCESS</p>';
                    
                    results.forEach(courier => {
                        html += `<div class="mt-3 border-t pt-2">`;
                        html += `<p class="font-bold">${courier.name}</p>`;
                        if (courier.costs) {
                            courier.costs.forEach(cost => {
                                const value = cost.cost[0].value;
                                const etd = cost.cost[0].etd;
                                html += `<p class="text-sm text-gray-600">- ${cost.service}: Rp ${value.toLocaleString('id-ID')} (${etd} days)</p>`;
                            });
                        }
                        html += '</div>';
                    });
                    
                    html += '</div>';
                    resultDiv.innerHTML = html;
                    log(`✅ SUCCESS: Shipping costs calculated`);
                } else if (data.error) {
                    throw new Error(data.error);
                } else {
                    throw new Error('Invalid response format');
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="bg-red-50 border border-red-200 rounded p-4">
                        <p class="font-bold text-red-800">❌ ERROR</p>
                        <p class="text-sm text-gray-600">${error.message}</p>
                    </div>
                `;
                log('❌ ERROR: ' + error.message);
            }
        }

        // Auto test on load
        window.addEventListener('load', () => {
            log('Page loaded. Ready to test!');
            log('Click buttons above to test each endpoint.');
        });
    </script>
</body>
</html>
