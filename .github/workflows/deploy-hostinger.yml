name: Deploy to Hostinger

# ============================================
# IMPORTANT NOTES - JANGAN HAPUS!
# ============================================
# 
# Domain jastiphype.shop di-point ke:
# /home/u909490256/domains/jastiphype.shop/public_html
# 
# BUKAN ke /home/u909490256/public_html (folder global)
# 
# Struktur folder yang HARUS dipertahankan:
# /domains/jastiphype.shop/
#   ├── public/           (Laravel public folder - original)
#   │   ├── build/        (Vite compiled assets)
#   │   └── ...
#   └── public_html/      (Domain document root - Hostinger)
#       ├── index.php     (Modified dengan path relatif ../)
#       ├── .htaccess     (Laravel rewrite rules)
#       ├── build/        (Symlink ke ../public/build)
#       └── storage/      (Symlink ke ../storage/app/public)
# 
# Key Points:
# 1. index.php HARUS menggunakan path relatif (../)
# 2. build/ dan storage/ HARUS di-symlink (bukan copy)
# 3. Setiap deployment HARUS sync public/ ke public_html/
# 4. Setiap deployment HARUS recreate symlinks
# 
# Jika diubah, website akan return 403 Forbidden!
# ============================================

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    # Step 1: Checkout code
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        persist-credentials: true
    
    # Step 2: Setup Node.js
    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    # Step 3: Install dependencies
    - name: 📦 Install npm dependencies
      run: npm ci
    
    # Step 4: Build assets
    - name: 🏗️ Build Vite assets
      run: npm run build
    
    # Step 5: Commit built assets
    - name: 💾 Commit built assets
      run: |
        git config user.name "GitHub Actions Bot"
        git config user.email "actions@github.com"
        git add public/build -f
        if ! git diff --staged --quiet; then
          git commit -m "build: compile assets [skip ci]"
          git push
        else
          echo "No changes to commit"
        fi
    
    # Step 6: Deploy to server
    - name: 🚀 Deploy via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SSH_PORT }}
        script: |
          # Enable error handling but continue on some errors
          set -e
          
          echo "🔍 Current directory and user info..."
          pwd
          whoami
          
          cd /home/u909490256/domains/jastiphype.shop || { echo "❌ Failed to change directory"; exit 1; }
          
          echo "📦 Pulling latest code..."
          echo "Current branch: $(git rev-parse --abbrev-ref HEAD)"
          echo "Current commit: $(git log -1 --oneline)"
          
          # Fetch all updates from remote
          echo "Fetching from remote..."
          git fetch --all || { echo "❌ Git fetch failed"; exit 1; }
          
          # Discard all local changes and sync with remote
          echo "Resetting to remote master..."
          git reset --hard origin/master || { echo "❌ Git reset failed"; exit 1; }
          
          # Remove any untracked files and directories
          echo "Cleaning untracked files..."
          git clean -fd || { echo "⚠️ Git clean had issues but continuing..."; }
          
          echo "✅ Repository synced with remote"
          echo "New commit: $(git log -1 --oneline)"
          
          echo "📚 Installing Composer dependencies..."
          composer install --no-dev --optimize-autoloader --no-interaction || { 
            echo "❌ Composer install failed"
            echo "Trying composer update..."
            composer update --no-dev --optimize-autoloader --no-interaction || exit 1
          }
          
          echo "🔐 Setting permissions..."
          chmod -R 775 storage bootstrap/cache 2>/dev/null || echo "⚠️ Some permission changes failed"
          chmod -R 755 public_html 2>/dev/null || echo "⚠️ public_html permission change failed"
          
          echo "🗄️ Running migrations..."
          php artisan migrate --force || echo "⚠️ Migration had issues but continuing..."
          
          echo "🧹 Clearing caches..."
          php artisan optimize:clear || echo "⚠️ Cache clear had issues"
          
          echo "⚡ Caching configuration..."
          php artisan config:cache || echo "⚠️ Config cache failed"
          php artisan route:cache || echo "⚠️ Route cache failed"
          php artisan view:cache || echo "⚠️ View cache failed"
          
          # ============================================
          # CRITICAL: Sync public folder to public_html
          # ============================================
          # JANGAN HAPUS BAGIAN INI!
          # Domain jastiphype.shop di-point ke /domains/jastiphype.shop/public_html
          # BUKAN ke /home/u909490256/public_html (folder global)
          # 
          # Struktur yang benar:
          # /domains/jastiphype.shop/
          #   ├── public/           (Laravel public folder - original)
          #   └── public_html/      (Domain document root - Hostinger)
          #       ├── index.php     (Modified dengan path relatif ../)
          #       ├── build/        (Symlink ke ../public/build)
          #       └── storage/      (Symlink ke ../storage/app/public)
          # ============================================
          
          echo "🔄 Syncing public folder to domain public_html..."
          
          # Sync Laravel public files to domain public_html
          # CRITICAL EXCLUDES:
          # - .builds: Hostinger internal folder (MUST NOT DELETE)
          # - build: Will be symlinked to ../public/build
          # - storage: Will be symlinked to ../storage/app/public
          # - index.php: Will be replaced with template (has different paths)
          rsync -av --delete \
            --exclude='.builds' \
            --exclude='build' \
            --exclude='storage' \
            --exclude='index.php' \
            public/ public_html/
          
          # Update index.php dengan path relatif (JANGAN DIUBAH!)
          # CRITICAL: index.php di public_html HARUS berbeda dari public/index.php
          # karena menggunakan path relatif ../ untuk akses parent folder
          cp public_html_index.php.template public_html/index.php
          echo "✅ index.php updated with relative paths"
          
          # Recreate symbolic links (PENTING untuk assets & storage)
          cd public_html
          rm -rf build storage 2>/dev/null || true
          ln -s ../public/build build 2>/dev/null || echo "⚠️ Build symlink failed"
          ln -s ../storage/app/public storage 2>/dev/null || echo "⚠️ Storage symlink failed"
          cd ..
          
          # Set permissions
          chmod -R 755 public_html
          chmod 644 public_html/index.php
          chmod 644 public_html/.htaccess 2>/dev/null || true
          
          # Verify critical files exist
          echo "🔍 Verifying deployment..."
          if [ -f "public_html/index.php" ]; then
            echo "✅ index.php exists"
            # Verify it has correct content (relative paths)
            if grep -q "__DIR__.'/../vendor/autoload.php'" public_html/index.php; then
              echo "✅ index.php has correct relative paths"
            else
              echo "❌ ERROR: index.php has wrong paths!"
              exit 1
            fi
          else
            echo "❌ ERROR: index.php missing!"
            exit 1
          fi
          
          if [ -L "public_html/build" ]; then
            echo "✅ build symlink exists"
          else
            echo "⚠️ WARNING: build symlink missing"
          fi
          
          echo "✅ Public folder synced to domain public_html"
          
          echo "🏥 Running health check..."
          if curl -f -s -o /dev/null -w "%{http_code}" https://jastiphype.shop | grep -q "200"; then
            echo "✅ Health check passed - Site is responding"
          else
            echo "⚠️ Warning: Health check failed, but deployment completed"
            echo "Site may need a few moments to fully restart"
          fi
          
          echo ""
          echo "✅ Deployment completed successfully!"
          echo "📊 Final status:"
          echo "   - Commit: $(git log -1 --oneline)"
          echo "   - Branch: $(git rev-parse --abbrev-ref HEAD)"
          echo "   - Time: $(date)"
    
    # Step 7: Success notification
    - name: ✅ Deployment Success
      if: success()
      run: |
        echo "::notice::Deployment to jastiphype.shop completed successfully!"
        echo "🎉 Website: https://jastiphype.shop"
    
    # Step 8: Failure notification
    - name: ❌ Deployment Failed
      if: failure()
      run: |
        echo "::error::Deployment to jastiphype.shop failed!"
        echo "Please check the logs above for details."
