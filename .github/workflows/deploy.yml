name: Deploy to Hostinger
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Deploy to Hostinger via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SSH_PORT }}
        command_timeout: 30m
        timeout: 30m
        script: |
          cd /home/u909490256/domains/jastiphype.shop
          
          # Pull latest code (use master branch)
          git pull origin master || git pull origin main
          
          # Install dependencies
          composer install --no-dev --optimize-autoloader --no-interaction
          
          # Copy public files to public_html
          cp -rf public/* public_html/
          
          # Set permissions
          chmod -R 775 storage bootstrap/cache
          chmod -R 755 public_html
          
          # Clear all caches first
          php artisan cache:clear
          php artisan route:clear
          php artisan config:clear
          php artisan view:clear
          
          # Run Laravel commands
          php artisan migrate --force
          
          # Migrate images from storage to public/uploads (run once, safe to run multiple times)
          echo "Migrating images to public folder..."
          php migrate-images-to-public.php || echo "Migration script completed with warnings"
          
          # Rebuild caches for production
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          
          # Verify storage route
          echo "Checking storage route..."
          php artisan route:list --path=storage
          
          echo "✅ Deployment completed!"