name: Deploy to Hostinger
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Deploy to Hostinger via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SSH_PORT }}
        command_timeout: 30m
        timeout: 30m
        script: |
          cd /home/u909490256/domains/jastiphype.shop
          
          # Pull latest code (use master branch)
          git pull origin master || git pull origin main
          
          # Install dependencies (skip if composer not available)
          composer install --no-dev --optimize-autoloader --no-interaction 2>/dev/null || echo "⚠️  Composer skipped"
          
          # Backup current .env (if exists)
          if [ -f .env ]; then
            cp .env .env.backup.$(date +%Y%m%d_%H%M%S)
          fi
          
          # Copy .env.hostinger to .env (production config)
          cp .env.hostinger .env
          
          # Ensure APP_KEY is set
          if ! grep -q "APP_KEY=base64:" .env; then
            php artisan key:generate --force
          fi
          
          # Create uploads folders if not exist
          mkdir -p public/uploads/products
          mkdir -p public/uploads/brands
          mkdir -p public/uploads/categories
          mkdir -p public/uploads/banners
          mkdir -p /home/u909490256/public_html/uploads/products
          mkdir -p /home/u909490256/public_html/uploads/brands
          mkdir -p /home/u909490256/public_html/uploads/categories
          mkdir -p /home/u909490256/public_html/uploads/banners
          
          # Set permissions
          chmod -R 775 storage bootstrap/cache
          chmod -R 755 public/uploads
          find storage -type f -exec chmod 664 {} \; 2>/dev/null || true
          find bootstrap/cache -type f -exec chmod 664 {} \; 2>/dev/null || true
          
          # Clear all caches first (remove files manually to avoid errors)
          rm -f bootstrap/cache/config.php
          rm -f bootstrap/cache/routes-*.php
          rm -f bootstrap/cache/services.php
          rm -f bootstrap/cache/packages.php
          php artisan cache:clear 2>/dev/null || true
          php artisan route:clear 2>/dev/null || true
          php artisan config:clear 2>/dev/null || true
          php artisan view:clear 2>/dev/null || true
          
          # Run Laravel commands
          php artisan migrate --force
          
          # Migrate images from storage/app/private to public/uploads
          echo "🚚 Migrating images from private to public..."
          php migrate-private-to-public.php 2>/dev/null || echo "⚠️  Migration script completed with warnings"
          
          # Copy public files to public_html (CORRECT PATH)
          echo "📋 Copying files to public_html..."
          cp -rf public/* /home/u909490256/public_html/
          
          # CRITICAL: Restore correct index.php and .htaccess for Hostinger
          echo "🔧 Fixing index.php and .htaccess for Hostinger structure..."
          cd /home/u909490256/public_html
          
          # Create correct .htaccess
          cat > .htaccess << 'HTACCESS_EOF'
<IfModule mod_rewrite.c>
    <IfModule mod_negotiation.c>
        Options -MultiViews -Indexes
    </IfModule>

    RewriteEngine On

    # Handle Authorization Header
    RewriteCond %{HTTP:Authorization} .
    RewriteRule .* - [E=HTTP_AUTHORIZATION:%{HTTP:Authorization}]

    # Redirect Trailing Slashes If Not A Folder...
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteCond %{REQUEST_URI} (.+)/$
    RewriteRule ^ %1 [L,R=301]

    # Send Requests To Front Controller...
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteRule ^ index.php [L]
</IfModule>
HTACCESS_EOF
          
          # Create correct index.php with path to Laravel
          cat > index.php << 'INDEX_EOF'
<?php

use Illuminate\Contracts\Http\Kernel;
use Illuminate\Http\Request;

define('LARAVEL_START', microtime(true));

if (file_exists($maintenance = __DIR__.'/../domains/jastiphype.shop/storage/framework/maintenance.php')) {
    require $maintenance;
}

require __DIR__.'/../domains/jastiphype.shop/vendor/autoload.php';

$app = require_once __DIR__.'/../domains/jastiphype.shop/bootstrap/app.php';

$kernel = $app->make(Kernel::class);

$response = $kernel->handle(
    $request = Request::capture()
)->send();

$kernel->terminate($request, $response);
INDEX_EOF
          
          # Set correct permissions
          chmod 644 .htaccess
          chmod 644 index.php
          chmod -R 755 /home/u909490256/public_html
          
          # Rebuild caches for production
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          
          # Verify configuration
          echo "🔍 Verifying FILESYSTEM_DISK..."
          php artisan tinker --execute="echo 'FILESYSTEM_DISK: ' . config('filesystems.default') . PHP_EOL;" 2>/dev/null || true
          
          echo "✅ Deployment completed!"
          echo "📊 Public_html status:"
          ls -lh /home/u909490256/public_html/ | head -10