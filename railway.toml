[build]
builder = "NIXPACKS"

[build.nixpacks]
providers = ["php", "node"]

[build.nixpacks.variables]
NIXPACKS_PHP_VERSION = "8.3"
NIXPACKS_NODE_VERSION = "20"

[phases.install]
dependsOn = ["setup"]
cmds = ["composer install --no-dev --optimize-autoloader", "npm ci"]

[phases.build]
dependsOn = ["install"]
cmds = ["npm run build"]

[deploy]
startCommand = "sh ./railway/init-app.sh && php artisan serve --host=0.0.0.0 --port=$PORT"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
